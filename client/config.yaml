model:
  # Micro CPU-friendly model for 4GB RAM: "sshleifer/tiny-gpt2" (2.5M params)
  # Standard CPU-friendly model: "gpt2" (124M params, needs 8GB+ RAM)
  name: "sshleifer/tiny-gpt2"
  use_quantization: false
  load_in_8bit: false
  load_in_4bit: false

training:
  # For gpt2 / tiny-gpt2 use ["c_attn"]
  lora_r: 4
  lora_alpha: 8
  lora_dropout: 0.1
  target_modules: ["c_attn"]
  batch_size: 1
  learning_rate: 1e-3
  num_epochs: 1
  max_seq_length: 32

federated:
  server_address: "127.0.0.1:8080"
  client_id: "user_001"
  min_examples: 2  # Minimum samples for training

data:
  local_data_path: "./data/user_data.json"
  cache_path: "./models/cache"