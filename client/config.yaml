model:
  # Standard CPU-friendly model for testing: "gpt2" (124M params)
  # High-performance model: "microsoft/phi-2" (2.7B params, requires GPU or high RAM)
  name: "gpt2"
  use_quantization: false  # Set to true only if running on GPU with bitsandbytes
  load_in_8bit: false
  load_in_4bit: false

training:
  # For gpt2 use ["c_attn"]
  # For phi-2 use ["q_proj", "v_proj"]
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  target_modules: ["c_attn"]
  batch_size: 1  # Tiny batch for memory
  learning_rate: 3e-4
  num_epochs: 1  # Standard 1 epoch for quick federated rounds
  max_seq_length: 64

federated:
  server_address: "127.0.0.1:8080"
  client_id: "user_001"
  min_examples: 2  # Minimum samples for training

data:
  local_data_path: "./data/user_data.json"
  cache_path: "./models/cache"