services:
  - type: web
    name: federated-llm-suite
    env: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_TF
        value: "0"
      - key: USE_JAX
        value: "0"
      - key: USE_TORCH
        value: "1"
      - key: PYTHON_VERSION
        value: 3.10.13
