version: '3.8'

services:
  federated-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "run_platform.py", "--mode", "server"]
    ports:
      - "8080:8080"
    environment:
      - FL_SERVER_HOST=0.0.0.0
      - FL_SERVER_PORT=8080
      - FL_NUM_ROUNDS=3
      - FL_MIN_FIT_CLIENTS=1
      - FL_MIN_AVAILABLE_CLIENTS=1
      - USE_TORCH=1
      - USE_TF=0
      - USE_JAX=0
    volumes:
      - ./models:/app/models
      - ./data:/app/data

  web-ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "run_platform.py", "--mode", "web"]
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - FL_SERVER_ADDRESS=federated-server:8080
      - FL_MODEL_NAME=sshleifer/tiny-gpt2
      - USE_TORCH=1
      - USE_TF=0
      - USE_JAX=0
    depends_on:
      - federated-server
    volumes:
      - ./data:/app/data
      - ./adapters:/app/adapters
      - ./models:/app/models

  client-1:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "run_platform.py", "--mode", "client"]
    environment:
      - FL_SERVER_ADDRESS=federated-server:8080
      - FL_CLIENT_ID=client_1
      - FL_MODEL_NAME=sshleifer/tiny-gpt2
      - USE_TORCH=1
      - USE_TF=0
      - USE_JAX=0
    depends_on:
      - federated-server
    volumes:
      - ./data:/app/data
      - ./adapters:/app/adapters
      - ./models:/app/models

volumes:
  models:
  data:
  adapters:
